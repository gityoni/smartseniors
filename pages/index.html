<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartSeniors — Votre assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #EDE5D8;
      --cream-dk: #E0D5C5;
      --brown:    #7D6B5E;
      --brown-dk: #5E4F45;
      --copper:   #D4824A;
      --copper-dk:#B8693A;
      --white:    #FDFAF6;
      --border:   #CFC0AD;
      --text:     #3D2E25;
    }

    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: var(--cream);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    header {
      background: var(--brown);
      color: #fff;
      padding: 16px 24px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 1.55rem; font-weight: 700; letter-spacing: 0.02em; }
    header h1 span { color: var(--copper); }
    header p { font-size: 0.95rem; opacity: 0.8; margin-top: 3px; font-weight: 400; }

    #font-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 8px 16px;
      background: var(--cream-dk);
      border-bottom: 1px solid var(--border);
    }
    #font-controls button {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 4px 16px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--brown);
      font-weight: 600;
      transition: border-color 0.2s, color 0.2s;
    }
    #font-controls button:hover { border-color: var(--copper); color: var(--copper); }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bubble {
      max-width: 78%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 1.1rem;
      line-height: 1.7;
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--copper);
      color: #fff;
      border-bottom-right-radius: 4px;
      font-weight: 600;
    }
    .bubble.assistant {
      align-self: flex-start;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .bubble.assistant h1,
    .bubble.assistant h2,
    .bubble.assistant h3 { color: var(--brown-dk); font-size: 1.05em; margin: 10px 0 4px; }
    .bubble.assistant p { margin: 6px 0; }
    .bubble.assistant ul, .bubble.assistant ol { padding-left: 1.4em; margin: 6px 0; }
    .bubble.assistant li { margin: 3px 0; }
    .bubble.assistant strong { color: var(--brown-dk); }
    .bubble.assistant hr { border: none; border-top: 2px solid var(--copper); opacity: 0.3; margin: 10px 0; }
    .bubble.assistant p:first-child { margin-top: 0; }
    .bubble.assistant p:last-child  { margin-bottom: 0; }

    .typing { align-self: flex-start; font-size: 1rem; color: var(--brown); padding: 10px 14px; opacity: 0.7; }
    .typing span { display: inline-block; animation: blink 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.15; } 40% { opacity: 1; } }

    #input-area {
      border-top: 1.5px solid var(--border);
      background: var(--white);
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      font-family: inherit;
      font-size: 1.1rem;
      line-height: 1.5;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 11px 15px;
      resize: none;
      min-height: 50px;
      max-height: 150px;
      overflow-y: auto;
      outline: none;
      background: var(--cream);
      color: var(--text);
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: var(--copper); }
    #user-input::placeholder { color: #9e8e80; }

    #send-btn {
      background: var(--copper);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px 22px;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    #send-btn:hover:not(:disabled) { background: var(--copper-dk); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    @media (max-width: 500px) {
      .bubble { max-width: 95%; font-size: 1rem; }
      #send-btn { padding: 13px 14px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Smart<span>Seniors</span></h1>
  <p>Votre assistant personnel — posez toutes vos questions</p>
</header>

<div id="font-controls" aria-label="Taille du texte">
  <button onclick="adjustFont(-2)">A− Réduire</button>
  <button onclick="adjustFont(2)">A+ Agrandir</button>
</div>

<div id="chat-box" role="log" aria-live="polite"></div>

<div id="input-area">
  <textarea id="user-input" placeholder="Écrivez votre question ici…" rows="1" aria-label="Votre message"></textarea>
  <button id="send-btn" onclick="sendMessage()">Envoyer</button>
</div>

<script>
  const chatBox = document.getElementById("chat-box");
  const input   = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");
  let history = [], fontSize = 17;

  if (typeof marked !== "undefined") marked.setOptions({ gfm: true, breaks: true });

  function renderMarkdown(text) {
    if (typeof marked !== "undefined") return marked.parse(text);
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\*(.+?)\*/g,"<em>$1</em>")
      .replace(/^#{1,3}\s+(.+)$/gm,"<strong>$1</strong>").replace(/^---$/gm,"<hr>")
      .replace(/\n/g,"<br>");
  }

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 150) + "px";
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function adjustFont(delta) {
    fontSize = Math.min(26, Math.max(13, fontSize + delta));
    document.querySelectorAll(".bubble, #user-input, #send-btn").forEach(el => {
      el.style.fontSize = fontSize + "px";
    });
  }

  function addBubble(role, text) {
    const div = document.createElement("div");
    div.className = `bubble ${role}`;
    if (role === "assistant") div.innerHTML = renderMarkdown(text);
    else div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "typing"; div.id = "typing-indicator";
    div.innerHTML = "L'assistant réfléchit<span>.</span><span>.</span><span>.</span>";
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() { document.getElementById("typing-indicator")?.remove(); }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;
    input.value = ""; input.style.height = "auto"; sendBtn.disabled = true;
    addBubble("user", text); showTyping();
    try {
      const res = await fetch("/api/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history }),
      });
      const data = await res.json(); removeTyping();
      if (!res.ok || data.error) {
        addBubble("assistant", "Désolé, une erreur s'est produite. Veuillez réessayer.");
      } else {
        addBubble("assistant", data.reply);
        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: data.reply });
        if (history.length > 20) history = history.slice(-20);
      }
    } catch {
      removeTyping();
      addBubble("assistant", "Impossible de contacter l'assistant. Vérifiez votre connexion internet.");
    }
    sendBtn.disabled = false; input.focus();
  }

  addBubble("assistant", "Bonjour ! Je suis votre assistant SmartSeniors.\nComment puis-je vous aider aujourd'hui ?");
</script>
</body>
</html>
