<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartSeniors — Votre assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #f5f0e8;
      color: #222;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }
    header {
      background: #2c5f8a;
      color: #fff;
      padding: 18px 24px;
      text-align: center;
    }
    header h1 { font-size: 1.6rem; letter-spacing: 0.03em; }
    header p  { font-size: 1rem; opacity: 0.85; margin-top: 4px; }
    #font-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px 16px;
      background: #f5f0e8;
      border-bottom: 1px solid #d0c8b8;
    }
    #font-controls button {
      background: #fff;
      border: 2px solid #aaa;
      border-radius: 8px;
      padding: 5px 16px;
      cursor: pointer;
      font-size: 1rem;
      color: #222;
    }
    #font-controls button:hover { border-color: #2c5f8a; color: #2c5f8a; }
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .bubble {
      max-width: 80%;
      padding: 16px 20px;
      border-radius: 18px;
      font-size: 1.15rem;
      line-height: 1.65;
      white-space: pre-wrap;
    }
    .bubble.user {
      align-self: flex-end;
      background: #2c5f8a;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      align-self: flex-start;
      background: #fff;
      border: 2px solid #d0c8b8;
      border-bottom-left-radius: 4px;
    }
    .typing {
      align-self: flex-start;
      font-size: 1.1rem;
      color: #888;
      padding: 12px 16px;
    }
    .typing span { display: inline-block; animation: blink 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }
    #input-area {
      border-top: 2px solid #d0c8b8;
      background: #fff;
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      font-family: inherit;
      font-size: 1.15rem;
      line-height: 1.5;
      border: 2px solid #aaa;
      border-radius: 12px;
      padding: 12px 16px;
      resize: none;
      min-height: 52px;
      max-height: 160px;
      overflow-y: auto;
      outline: none;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: #2c5f8a; }
    #send-btn {
      background: #2c5f8a;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 22px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    #send-btn:hover:not(:disabled) { background: #1e4a70; }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
    @media (max-width: 500px) {
      .bubble { max-width: 95%; }
      #send-btn { padding: 14px; }
    }
  </style>
</head>
<body>

<header>
  <h1>SmartSeniors</h1>
  <p>Votre assistant personnel — posez toutes vos questions</p>
</header>

<div id="font-controls" aria-label="Taille du texte">
  <button onclick="adjustFont(-2)">A− Réduire</button>
  <button onclick="adjustFont(2)">A+ Agrandir</button>
</div>

<div id="chat-box" role="log" aria-live="polite"></div>

<div id="input-area">
  <textarea
    id="user-input"
    placeholder="Écrivez votre question ici…"
    rows="1"
    aria-label="Votre message"
  ></textarea>
  <button id="send-btn" onclick="sendMessage()">Envoyer</button>
</div>

<script>
  const chatBox = document.getElementById("chat-box");
  const input   = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");

  let history = [];
  let fontSize = 18;

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function adjustFont(delta) {
    fontSize = Math.min(28, Math.max(14, fontSize + delta));
    document.querySelectorAll(".bubble, #user-input, #send-btn").forEach(el => {
      el.style.fontSize = fontSize + "px";
    });
  }

  function addBubble(role, text) {
    const div = document.createElement("div");
    div.className = `bubble ${role}`;
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing-indicator";
    div.innerHTML = "L'assistant réfléchit<span>.</span><span>.</span><span>.</span>";
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    document.getElementById("typing-indicator")?.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    input.value = "";
    input.style.height = "auto";
    sendBtn.disabled = true;

    addBubble("user", text);
    showTyping();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history }),
      });
      const data = await res.json();
      removeTyping();

      if (!res.ok || data.error) {
        addBubble("assistant", "Désolé, une erreur s'est produite. Veuillez réessayer.");
      } else {
        addBubble("assistant", data.reply);
        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: data.reply });
        if (history.length > 20) history = history.slice(-20);
      }
    } catch {
      removeTyping();
      addBubble("assistant", "Impossible de contacter l'assistant. Vérifiez votre connexion internet.");
    }

    sendBtn.disabled = false;
    input.focus();
  }

  addBubble("assistant", "Bonjour ! Je suis votre assistant SmartSeniors.\nComment puis-je vous aider aujourd'hui ?");
</script>
</body>
</html>
